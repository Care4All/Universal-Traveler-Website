document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Newsreader';\n  font-style: italic;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"b365cc35-ca86-4c59-ba79-28e1b67777eb\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   COLORS — Universal Traveler\n   Exact palette from the production site. oklch throughout:\n   cool-warm neutrals (ink/paper), an ocean-teal brand, a\n   \"Purple Dollar\" community purple, amber warmth, and mint.\n   The live accent is swappable (Ocean teal / Purple / Deep sea).\n   ============================================================ */\n:root {\n  /* ---- Ink & paper (cool-warm neutrals) ---- */\n  --ink:        oklch(0.24 0.022 235);\n  --ink-soft:   oklch(0.45 0.018 235);\n  --ink-faint:  oklch(0.60 0.012 235);\n  --paper:      oklch(0.987 0.005 230);\n  --paper-2:    oklch(0.967 0.009 222);\n  --paper-3:    oklch(0.945 0.013 220);\n  --line:       oklch(0.905 0.012 228);\n  --line-soft:  oklch(0.935 0.009 228);\n  --white:      oklch(0.995 0.003 230);\n\n  /* ---- Brand ---- */\n  --teal:        oklch(0.49 0.105 213);   /* ocean primary (AA on white) */\n  --teal-bright: oklch(0.64 0.115 205);\n  --teal-deep:   oklch(0.36 0.068 219);   /* dark section bg */\n  --teal-ink:    oklch(0.255 0.05 224);   /* deepest */\n  --purple:      oklch(0.55 0.15 305);    /* \"Purple Dollar\" community */\n  --purple-soft: oklch(0.93 0.045 305);\n  --amber:       oklch(0.76 0.125 62);    /* warmth / heart / stars */\n  --amber-soft:  oklch(0.93 0.05 70);\n  --mint:        oklch(0.93 0.05 182);    /* on-dark accent + highlights */\n\n  /* ---- The live accent (swappable via App shell) ---- */\n  --accent:      var(--teal);\n  --accent-deep: var(--teal-deep);\n  --accent-ink:  var(--teal-ink);\n  --accent-on:   var(--white);\n\n  /* ---- Status (used by result/success states) ---- */\n  --success:     oklch(0.45 0.13 150);\n  --success-bg:  oklch(0.95 0.06 150);\n  --warning:     oklch(0.62 0.14 62);\n  --warning-bg:  var(--amber-soft);\n  --danger:      oklch(0.55 0.19 25);\n  --danger-bg:   oklch(0.94 0.05 25);\n\n  /* ---- Semantic text/surface aliases ---- */\n  --text-strong:  var(--ink);\n  --text-body:    var(--ink-soft);\n  --text-muted:   var(--ink-faint);\n  --text-on-dark: var(--white);\n  --surface-page: var(--paper);\n  --surface-card: var(--white);\n  --surface-sunken: var(--paper-2);\n  --surface-dark: var(--teal-ink);\n\n  /* focus ring is purple everywhere — high visibility over teal */\n  --focus: var(--purple);\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   RADIUS — Universal Traveler\n   Generously rounded. Pills for buttons/chips; large radii on\n   cards and hero panels.\n   ============================================================ */\n:root {\n  --r-sm:   12px;   /* small controls, tiles */\n  --r:      18px;   /* inputs, list rows, menu items */\n  --r-lg:   26px;   /* cards, popovers */\n  --r-xl:   34px;   /* hero panels, feature blocks */\n  --r-pill: 999px;  /* buttons, chips, toggles */\n\n  /* semantic */\n  --radius-control: var(--r);\n  --radius-card:    var(--r-lg);\n  --radius-panel:   var(--r-xl);\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   ELEVATION — Universal Traveler\n   Soft, cool-tinted oklch shadows. Four steps; a dramatic\n   \"float\" for hero devices and lifted panels.\n   ============================================================ */\n:root {\n  --sh-1:     0 1px 2px oklch(0.4 0.03 235 / 0.05), 0 2px 6px oklch(0.4 0.03 235 / 0.05);\n  --sh-2:     0 6px 18px oklch(0.4 0.03 235 / 0.08), 0 2px 5px oklch(0.4 0.03 235 / 0.05);\n  --sh-3:     0 22px 50px oklch(0.35 0.04 235 / 0.16), 0 8px 18px oklch(0.35 0.04 235 / 0.08);\n  --sh-float: 0 40px 90px oklch(0.3 0.05 230 / 0.28), 0 12px 30px oklch(0.3 0.05 230 / 0.14);\n\n  /* semantic */\n  --elevation-card:    var(--sh-2);\n  --elevation-raised:  var(--sh-3);\n  --elevation-overlay: var(--sh-float);\n}\n<\u002Fstyle>\n<style>\n  *{box-sizing:border-box}\n  body{margin:0;font-family:\"Hanken Grotesk\",ui-sans-serif,system-ui,sans-serif;\n    --sans:\"Hanken Grotesk\",ui-sans-serif,system-ui,sans-serif;\n    --serif:\"Newsreader\",Georgia,serif;\n    --mono:\"IBM Plex Mono\",ui-monospace,monospace;\n    background:\n      radial-gradient(110% 80% at 8% 0%, oklch(0.95 0.045 182) 0%, transparent 42%),\n      radial-gradient(90% 70% at 100% 100%, var(--purple-soft) 0%, transparent 48%),\n      oklch(0.955 0.014 210);\n    min-height:100vh;color:var(--ink);-webkit-font-smoothing:antialiased}\n  .utscroll::-webkit-scrollbar{width:10px}\n  .utscroll::-webkit-scrollbar-thumb{background:oklch(0.85 0.01 228);border-radius:999px;border:3px solid transparent;background-clip:content-box}\n  @keyframes utpop{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}\n  @keyframes utrise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}\n  @keyframes utlaunch{0%{transform:translateY(3px)}50%{transform:translateY(-5px)}100%{transform:translateY(3px)}}\n  .wl-in::placeholder{color:var(--ink-faint)}\n  .wl-in:focus{border-color:var(--purple)!important;box-shadow:0 0 0 3px var(--purple-soft)!important;outline:none}\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"min-height:100vh;display:flex;flex-direction:column;align-items:center;gap:20px;padding:36px 24px 56px\">\n\n  <div style=\"display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center\">\n    <span style=\"display:inline-flex;align-items:center;gap:9px;font-weight:700;font-size:0.74rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--teal)\">\n      <span style=\"width:24px;height:2px;background:var(--teal);border-radius:2px\"><\u002Fspan>Desktop web · Universal Traveler<\u002Fspan>\n    <h1 style=\"margin:0;font-size:1.7rem;font-weight:800;letter-spacing:-0.03em\">The full platform on the web.<\u002Fh1>\n  <\u002Fdiv>\n\n  <!-- WINDOW -->\n  <div style=\"width:1360px;max-width:100%;height:860px;border-radius:20px;overflow:hidden;background:var(--paper);box-shadow:0 44px 90px oklch(0.3 0.05 230 / 0.28),0 14px 32px oklch(0.3 0.05 230 / 0.14);border:1px solid var(--line);position:relative\">\n    <div style=\"{{ appStyle }}\">\n\n      <!-- SIDEBAR -->\n      <aside style=\"background:var(--white);border-right:1px solid var(--line);display:flex;flex-direction:column;padding:22px 16px\">\n        <span style=\"display:inline-flex;align-items:center;gap:11px;padding:0 8px 20px\">\n          <span style=\"width:36px;height:36px;border-radius:12px;background:var(--teal);color:var(--white);display:grid;place-items:center;flex:none;box-shadow:var(--sh-1)\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.1\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"{{ I.globe }}\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n          <span style=\"font-weight:800;letter-spacing:-0.02em;font-size:1.14rem;line-height:1\">Universal<span style=\"color:var(--teal)\">Traveler<\u002Fspan><\u002Fspan>\n        <\u002Fspan>\n        <nav style=\"display:grid;gap:3px\">\n          <sc-for list=\"{{ sidebar }}\" as=\"n\" hint-placeholder-count=\"7\">\n            <button onclick=\"{{ n.onClick }}\" aria-current=\"{{ n.active }}\" style=\"{{ n.itemStyle }}\">\n              <svg width=\"21\" height=\"21\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"{{ n.stroke }}\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex:none\"><path d=\"{{ n.d }}\"><\u002Fpath><\u002Fsvg>\n              <span style=\"flex:1;text-align:left\">{{ n.label }}
